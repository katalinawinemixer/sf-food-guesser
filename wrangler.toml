name = "spotted-in-sf"
compatibility_date = "2026-05-27"
pages_build_output_dir = "frontend/dist"

# Maintainer deployment config for the live portfolio demo.
#
# These Cloudflare project and KV namespace identifiers are not API keys or
# runtime secrets. They are safe to keep visible for portfolio review, but forks
# should replace the project name and namespace IDs with their own Cloudflare
# resources before deploying.

[vars]
# Set VITE_API_BASE_URL in the Cloudflare Pages dashboard at build time when the
# API is deployed somewhere other than the same origin.
VITE_API_BASE_URL = ""
OPENROUTER_VISION_MODEL = "openai/gpt-4o-mini"
OPENROUTER_FALLBACK_MODELS = "qwen/qwen3-vl-32b-instruct,google/gemma-4-26b-a4b-it:free,nvidia/nemotron-nano-12b-v2-vl:free"
EXA_SEARCH_TYPE = "deep"
EXA_NUM_RESULTS = "6"
EXA_MAX_PARALLEL_QUERIES = "4"
SF_FOOD_RATE_LIMIT_REQUIRED = "true"

[[kv_namespaces]]
binding = "SF_FOOD_FEEDBACK_KV"
id = "ebc5b021ab2e48f08b2d882c17cc5519"

[[kv_namespaces]]
binding = "SF_FOOD_RATE_LIMIT_KV"
id = "ebc5b021ab2e48f08b2d882c17cc5519"

[[kv_namespaces]]
binding = "SF_FOOD_SEARCH_CACHE_KV"
id = "ebc5b021ab2e48f08b2d882c17cc5519"
